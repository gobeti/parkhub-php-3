# fly.toml — ParkHub PHP on Fly.io
# Deploy: flyctl launch --no-deploy, set APP_KEY + MYSQL passwords via `fly secrets`, then `flyctl deploy`
app = "parkhub-php"
primary_region = "fra"

[build]
  image = "ghcr.io/nash87/parkhub-php:latest"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  MAIL_MAILER = "log"
  DEMO_MODE = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"

[[mounts]]
  source = "parkhub_data"
  destination = "/data"
  initial_size = "1gb"

[deploy]
  strategy = "rolling"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
