# ParkHub PHP Helm Chart — default values

replicaCount: 1

image:
  repository: ghcr.io/nash87/parkhub-php
  pullPolicy: IfNotPresent
  tag: ""  # defaults to appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 33  # www-data
  fsGroup: 33

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: parkhub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: parkhub-tls
  #    hosts:
  #      - parkhub.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /var/www/html/storage

nodeSelector: {}
tolerations: []
affinity: {}

# -- Laravel application configuration
config:
  port: 80
  appKey: ""  # required — generate with: php artisan key:generate --show
  appEnv: production
  appDebug: false
  appUrl: "http://parkhub.local"
  logLevel: warning
  demoMode: false

  # Admin
  adminEmail: ""
  adminPassword: ""  # auto-generated if empty

  # Database
  dbConnection: mysql  # mysql, pgsql, sqlite
  dbHost: ""
  dbPort: 3306
  dbDatabase: parkhub
  dbUsername: parkhub
  dbPassword: ""

  # Cache / Queue / Session
  cacheDriver: redis
  queueConnection: redis
  sessionDriver: redis

  # Redis
  redisHost: ""
  redisPort: 6379
  redisPassword: ""

  # SMTP
  smtp:
    host: ""
    port: 587
    user: ""
    password: "CHANGEME"  # override at deploy time
    from: "noreply@parkhub.local"

  # Stripe
  stripe:
    secretKey: ""
    webhookSecret: ""

  # OAuth
  oauth:
    google:
      clientId: ""
      clientSecret: ""
    github:
      clientId: ""
      clientSecret: ""

# -- Module feature flags (all enabled by default)
modules:
  bookings: true
  vehicles: true
  absences: true
  branding: true
  import: true
  qr: true
  pwa: true
  payments: true
  webhooks: true
  notifications: true
  announcements: true
  recurring: true
  guest: true
  calendar: true
  team: true
  settings: true
  jobs: true
  swap: true
  waitlist: true
  zones: true
  credits: true
  email: true
  export: true
  favorites: true
  push: true
  recommendations: true
  translations: true
  social: true
  themes: true
  invoices: true
  dynamicPricing: true
  operatingHours: true
  oauth: true
  map: true
  stripe: true
  tenants: true
  rateLimit: true
  accessible: true
  maintenance: true
  costCenter: true
  fleet: true
  dataManagement: true
  auditLogUi: true
  history: true
  geofence: true
  visitors: true
  evCharging: true
  waitlistExt: true
  parkingPass: true
  apiDocs: true
  absenceApproval: true
  calendarDrag: true
  widgets: true

# -- MySQL dependency (optional in-cluster database)
mysql:
  enabled: false
  auth:
    database: parkhub
    username: parkhub
    password: "CHANGEME"  # override at deploy time
    rootPassword: "CHANGEME"  # override at deploy time

# -- Redis dependency (optional in-cluster cache)
redis:
  enabled: false
  auth:
    password: "CHANGEME"  # override at deploy time

# -- Extra environment variables
extraEnv: []
#  - name: CUSTOM_VAR
#    value: "custom-value"
