apiVersion: v1
kind: Secret
metadata:
  name: {{ include "parkhub.fullname" . }}
  labels:
    {{- include "parkhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ required "config.appKey is required (run: php artisan key:generate --show)" .Values.config.appKey | quote }}
  {{- if .Values.config.adminPassword }}
  PARKHUB_ADMIN_PASSWORD: {{ .Values.config.adminPassword | quote }}
  {{- end }}
  {{- if .Values.config.dbPassword }}
  DB_PASSWORD: {{ .Values.config.dbPassword | quote }}
  {{- end }}
  {{- if .Values.config.redisPassword }}
  REDIS_PASSWORD: {{ .Values.config.redisPassword | quote }}
  {{- end }}
  {{- if .Values.config.smtp.password }}
  MAIL_PASSWORD: {{ .Values.config.smtp.password | quote }}
  {{- end }}
  {{- if .Values.config.stripe.secretKey }}
  STRIPE_SECRET: {{ .Values.config.stripe.secretKey | quote }}
  {{- end }}
  {{- if .Values.config.stripe.webhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.config.stripe.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.config.oauth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.config.oauth.google.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oauth.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.config.oauth.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.oauth.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.config.oauth.github.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oauth.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.config.oauth.github.clientSecret | quote }}
  {{- end }}
