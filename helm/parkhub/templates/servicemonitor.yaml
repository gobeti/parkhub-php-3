{{- if .Values.monitoring.serviceMonitor.enabled }}
# ServiceMonitor — Prometheus Operator CRD.
#
# Gated behind `monitoring.serviceMonitor.enabled` so the chart still
# installs cleanly on clusters that do not have prometheus-operator
# and therefore do not carry the monitoring.coreos.com/v1 CRDs.
#
# ParkHub PHP exposes its Prometheus text endpoint at /api/metrics
# (MetricsController) — see routes/api.php. The endpoint requires a
# bearer token matching METRICS_TOKEN when that env var is set, so
# when the chart ships a METRICS_TOKEN secret, reference it via
# `monitoring.serviceMonitor.bearerTokenSecret`.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "parkhub.fullname" . }}
  labels:
    {{- include "parkhub.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "parkhub.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /api/metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout | default "10s" }}
      honorLabels: true
      {{- if .Values.monitoring.serviceMonitor.bearerTokenSecret }}
      bearerTokenSecret:
        name: {{ .Values.monitoring.serviceMonitor.bearerTokenSecret.name | quote }}
        key: {{ .Values.monitoring.serviceMonitor.bearerTokenSecret.key | default "METRICS_TOKEN" | quote }}
      {{- end }}
{{- end }}
