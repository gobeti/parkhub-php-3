apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "parkhub.fullname" . }}
  labels:
    {{- include "parkhub.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "parkhub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "parkhub.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Give Apache + php-fpm up to 45s to finish in-flight requests on
      # SIGTERM. The preStop hook sleeps longer than the readinessProbe
      # periodSeconds so kube-proxy pulls this pod out of the Service
      # endpoints list before the container starts refusing new
      # connections.
      terminationGracePeriodSeconds: 45
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- if .Values.security.readOnlyRootFilesystem.enabled }}
            readOnlyRootFilesystem: true
            {{- end }}
          image: "{{ .Values.image.repository }}:{{ include "parkhub.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15 && apache2ctl graceful-stop"]
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          envFrom:
            - configMapRef:
                name: {{ include "parkhub.fullname" . }}
            - secretRef:
                name: {{ include "parkhub.fullname" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.security.readOnlyRootFilesystem.enabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.security.readOnlyRootFilesystem.enabled }}
            {{- /* Laravel writes compiled views, config cache, package manifest here */}}
            - name: bootstrap-cache
              mountPath: /var/www/html/bootstrap/cache
            {{- /* Laravel writes logs, framework cache, sessions, file-driver cache here */}}
            {{- if not .Values.persistence.enabled }}
            - name: storage
              mountPath: /var/www/html/storage
            {{- end }}
            {{- /* Apache mpm_prefork writes its pidfile + scoreboard here */}}
            - name: apache-run
              mountPath: /var/run/apache2
            {{- /* Apache mod_rewrite + other modules take advisory locks here */}}
            - name: apache-lock
              mountPath: /var/lock/apache2
            {{- /* PHP tempfile upload buffer + sys_get_temp_dir() writes */}}
            - name: tmp
              mountPath: /tmp
            {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.security.readOnlyRootFilesystem.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "parkhub.fullname" . }}
        {{- end }}
        {{- if .Values.security.readOnlyRootFilesystem.enabled }}
        - name: bootstrap-cache
          emptyDir:
            sizeLimit: {{ .Values.security.readOnlyRootFilesystem.sizeLimit }}
        {{- if not .Values.persistence.enabled }}
        - name: storage
          emptyDir:
            sizeLimit: {{ .Values.security.readOnlyRootFilesystem.sizeLimit }}
        {{- end }}
        - name: apache-run
          emptyDir:
            sizeLimit: {{ .Values.security.readOnlyRootFilesystem.sizeLimit }}
        - name: apache-lock
          emptyDir:
            sizeLimit: {{ .Values.security.readOnlyRootFilesystem.sizeLimit }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.security.readOnlyRootFilesystem.sizeLimit }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      # T-1791: spread replicas across nodes. whenUnsatisfiable=ScheduleAnyway
      # keeps single-node/dev clusters schedulable while still giving kube-scheduler
      # a strong preference to balance Pods across hostnames.
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
