name: Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.12.0'

jobs:
  build-and-test:
    name: Build + test-storybook
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        working-directory: parkhub-web
        run: npm ci

      - name: Install Playwright browsers (chromium)
        working-directory: parkhub-web
        run: npx playwright install --with-deps chromium

      - name: Build Storybook static site
        working-directory: parkhub-web
        run: npm run build-storybook

      - name: Serve Storybook (background)
        working-directory: parkhub-web
        # Use --no-install so npx can only execute the copies installed
        # from package-lock.json by `npm ci`. Prevents CI from silently
        # pulling whatever the latest upstream release happens to be,
        # which is the supply-chain risk flagged in PR #345 review.
        run: |
          nohup npx --no-install http-server storybook-static -p 6006 --silent -a 127.0.0.1 > /tmp/storybook-server.log 2>&1 &
          npx --no-install wait-on tcp:127.0.0.1:6006 --timeout 60000

      - name: Run test-storybook
        working-directory: parkhub-web
        run: npx test-storybook --url http://127.0.0.1:6006 --browsers chromium --maxWorkers=2

      - name: Upload Storybook static build
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storybook-static
          path: parkhub-web/storybook-static
          retention-days: 14
