name: Build & Push Docker Image to GHCR

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Ensure Render env vars
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          # Render API v1: PUT /env-vars replaces ALL env vars, so we must
          # fetch existing, merge desired keys, then PUT the full set back.
          SVC="https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}"
          AUTH="Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

          # Fetch current env vars
          CURRENT=$(curl -sf "$SVC/env-vars" -H "$AUTH" 2>/dev/null || echo "[]")

          # Build merged JSON: update/add our keys, keep everything else
          MERGED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          current = json.load(sys.stdin)
          if isinstance(current, list):
              env = {e['key']: e['value'] for e in current}
          else:
              env = current.get('envVars', {}) if isinstance(current, dict) else {}
          # Set required demo env vars
          env['DEMO_MODE'] = 'true'
          env['PARKHUB_ADMIN_PASSWORD'] = 'demo'
          env['PARKHUB_ADMIN_EMAIL'] = 'admin@parkhub.test'
          env['DB_CONNECTION'] = 'sqlite'
          env['DB_DATABASE'] = '/var/www/html/database/database.sqlite'
          env['LOG_CHANNEL'] = 'stderr'
          env['APP_ENV'] = 'production'
          env['APP_DEBUG'] = 'false'
          env.setdefault('APP_URL', 'https://parkhub-php-demo.onrender.com')
          env.setdefault('SESSION_DRIVER', 'file')
          env.setdefault('CACHE_STORE', 'file')
          env.setdefault('MAIL_MAILER', 'log')
          print(json.dumps([{'key': k, 'value': v} for k, v in env.items()]))
          ")

          # PUT the merged set
          curl -sf -X PUT "$SVC/env-vars" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "$MERGED" || echo "WARNING: Failed to set env vars"

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}'
