name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22.12.0'

jobs:
  validate-tag:
    name: Validate release ref + version surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Require v* tag ref
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "workflow_dispatch must target a v* tag ref"
            exit 1
          fi

      - name: Check release version parity
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          tag = os.environ["GITHUB_REF_NAME"].strip()
          expected = tag[1:] if tag.startswith("v") else tag

          version_file = pathlib.Path("VERSION").read_text().strip()
          web_package = json.loads(pathlib.Path("parkhub-web/package.json").read_text())["version"]

          mismatches = []
          if version_file != expected:
              mismatches.append(f"VERSION={version_file}")
          if web_package != expected:
              mismatches.append(f"parkhub-web/package.json={web_package}")

          if mismatches:
              raise SystemExit(
                  "Release version mismatch for tag "
                  f"{tag}: expected {expected}, got " + ", ".join(mismatches)
              )
          PY
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate-tag]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, curl, gd, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, xml, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            parkhub-web/package-lock.json

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run core pre-release gate
        run: make ci

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          draft: false
