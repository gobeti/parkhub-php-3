name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, bcmath, sqlite3, pdo_sqlite, gd, zip, curl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests (SQLite in-memory)
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  coverage:
    name: PHP Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, bcmath, sqlite3, pdo_sqlite, gd, zip, curl
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-coverage-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-coverage-composer-

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --coverage-clover=coverage.xml
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies (no-dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Run composer security audit
        run: composer audit --no-dev --format=plain

  lint:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, bcmath, sqlite3, pdo_sqlite, gd, zip, curl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-phpstan-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-composer-

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies (including dev)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check if PHPStan is installed
        id: phpstan_check
        run: |
          if [ -f vendor/bin/phpstan ]; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PHPStan not found — add larastan/larastan to require-dev to enable static analysis"
          fi

      - name: Run PHPStan
        if: steps.phpstan_check.outputs.installed == 'true'
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: parkhub-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

      - name: Build frontend
        run: npm run build

  # Gate job — the branch protection "CI" required status check matches this job name
  ci:
    name: CI
    if: always()
    needs: [test, test-postgres, coverage, audit, lint, analyse, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed: ${{ needs.lint.result }}"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "frontend failed: ${{ needs.frontend.result }}"
            exit 1
          fi
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "dependency audit failed: ${{ needs.audit.result }}"
            exit 1
          fi
          # PostgreSQL tests are informational — warn but don't block
          if [[ "${{ needs.test-postgres.result }}" == "failure" ]]; then
            echo "::warning::PostgreSQL tests failed — check DB-specific SQL compatibility"
          fi
          # analyse and coverage are informational — warn but don't block
          if [[ "${{ needs.analyse.result }}" == "failure" ]]; then
            echo "::warning::PHPStan analysis failed — consider fixing static analysis errors"
          fi
          echo "All required checks passed"
