name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22.12.0'

jobs:
  workflow-hygiene:
    name: Workflow & manifest hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.11

      - name: Lint YAML
        run: |
          python3 -m pip install --user yamllint
          ~/.local/bin/yamllint -c .yamllint.yml .github/workflows docker-compose.yml render.yaml koyeb.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Validate Helm chart
        run: |
          helm lint ./helm/parkhub --set config.appKey=base64:ci-dummy-app-key
          helm template parkhub ./helm/parkhub --set config.appKey=base64:ci-dummy-app-key > /dev/null

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config -q

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, curl, gd, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint PHP files
        run: find app bootstrap config database routes tests -name '*.php' -print0 | xargs -0 -n 50 php -l > /dev/null

      - name: Check Laravel Pint formatting
        run: ./vendor/bin/pint --test

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, curl, gd, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Bootstrap Laravel for SQLite tests
        run: ./scripts/ci/bootstrap-laravel.sh
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Run Laravel test suite
        run: composer test

  frontend:
    name: Frontend builds
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            parkhub-web/package-lock.json

      - name: Install root frontend dependencies
        run: npm ci

      - name: Install Astro frontend dependencies
        run: npm ci --prefix parkhub-web

      - name: Run Astro frontend tests
        run: npm test --prefix parkhub-web

      - name: Build shared frontend
        run: npm run build

  e2e-smoke:
    name: E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, curl, gd, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            parkhub-web/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install backend dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: |
          npm ci
          npm ci --prefix parkhub-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build browser assets for Laravel
        run: npm run build:php --prefix parkhub-web

      - name: Run Playwright smoke suite
        env:
          CI: true
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          DEMO_MODE: 'true'
          E2E_BASE_URL: http://127.0.0.1:8082
          PARKHUB_ADMIN_EMAIL: admin@parkhub.test
          PARKHUB_ADMIN_PASSWORD: demo
          RUN_STORAGE_LINK: '1'
        run: |
          ./scripts/ci/bootstrap-laravel.sh
          php artisan migrate:fresh --seed --force

          php artisan serve --host=127.0.0.1 --port=8082 > /tmp/parkhub-e2e.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          ./scripts/ci/wait-for-url.sh http://127.0.0.1:8082/api/v1/health/live 60
          npx playwright test e2e/api.spec.ts e2e/pages.spec.ts --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Laravel server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-server-log
          path: /tmp/parkhub-e2e.log
          retention-days: 7

  docker-validate:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: parkhub-php:ci
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,scope=ci-docker,mode=max

  required:
    name: Required checks
    if: always()
    needs:
      - workflow-hygiene
      - backend-quality
      - backend-tests
      - frontend
      - e2e-smoke
      - docker-validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Assert required jobs succeeded
        env:
          WORKFLOW_HYGIENE: ${{ needs.workflow-hygiene.result }}
          BACKEND_QUALITY: ${{ needs.backend-quality.result }}
          BACKEND_TESTS: ${{ needs.backend-tests.result }}
          FRONTEND: ${{ needs.frontend.result }}
          E2E_SMOKE: ${{ needs.e2e-smoke.result }}
          DOCKER_VALIDATE: ${{ needs.docker-validate.result }}
        run: |
          for check in BACKEND_TESTS DOCKER_VALIDATE; do
            if [[ "${!check}" != "success" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
          done
          for check in WORKFLOW_HYGIENE BACKEND_QUALITY FRONTEND E2E_SMOKE; do
            if [[ "${!check}" != "success" ]]; then
              echo "ADVISORY: ${check}: ${!check}"
            fi
          done
