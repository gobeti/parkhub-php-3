version: 2
updates:
  # GitHub Actions — group all minor + patch action bumps. Major bumps
  # remain individual so workflow YAML can be reviewed action-by-action.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 10
      semver-major-days: 15
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5

  # npm (root tooling)
  # Minor + patch grouped, majors ungrouped for individual review.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-tooling-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # tailwindcss + @tailwindcss/vite 4.2.3 and 4.2.4 ship a vite build
      # regression: "Missing field tsconfigPaths on
      # BindingViteResolvePluginConfig.resolveOptions". Pin past them
      # until 4.2.5+ is verified green. Drop once upstream ships fix.
      - dependency-name: "tailwindcss"
        versions: [">=4.2.3 <4.2.5"]
      - dependency-name: "@tailwindcss/vite"
        versions: [">=4.2.3 <4.2.5"]
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 10
      semver-major-days: 15
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5

  # npm (parkhub-web frontend)
  - package-ecosystem: "npm"
    directory: "/parkhub-web"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # tailwindcss + @tailwindcss/vite 4.2.3 and 4.2.4 ship a vite build
      # regression: "Missing field tsconfigPaths on
      # BindingViteResolvePluginConfig.resolveOptions". Pin past them
      # until 4.2.5+ is verified green. Drop once upstream ships fix.
      - dependency-name: "tailwindcss"
        versions: [">=4.2.3 <4.2.5"]
      - dependency-name: "@tailwindcss/vite"
        versions: [">=4.2.3 <4.2.5"]
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 10
      semver-major-days: 15
    labels: ["dependencies", "frontend"]
    open-pull-requests-limit: 5

  # Composer (PHP) — minor + patch grouped, majors ungrouped.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      composer-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 10
      semver-major-days: 15
    labels: ["dependencies", "php"]
    open-pull-requests-limit: 5

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 10
      semver-major-days: 15
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 5
