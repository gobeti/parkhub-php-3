version: 2
updates:
  # GitHub Actions — group all action bumps into one PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5

  # npm (root tooling)
  # Minor + patch grouped, majors ungrouped for individual review.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-tooling-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # tailwindcss 4.2.4 / @tailwindcss/vite 4.2.4 ship a vite build
      # regression: "Missing field tsconfigPaths on
      # BindingViteResolvePluginConfig.resolveOptions". Pin past it
      # until 4.2.5+ is released. Drop these entries once upstream ships.
      - dependency-name: "tailwindcss"
        versions: ["4.2.4"]
      - dependency-name: "@tailwindcss/vite"
        versions: ["4.2.4"]
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5

  # npm (parkhub-web frontend)
  - package-ecosystem: "npm"
    directory: "/parkhub-web"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # tailwindcss 4.2.4 / @tailwindcss/vite 4.2.4 ship a vite build
      # regression: "Missing field tsconfigPaths on
      # BindingViteResolvePluginConfig.resolveOptions". Pin past it
      # until 4.2.5+ is released. Drop these entries once upstream ships.
      - dependency-name: "tailwindcss"
        versions: ["4.2.4"]
      - dependency-name: "@tailwindcss/vite"
        versions: ["4.2.4"]
    labels: ["dependencies", "frontend"]
    open-pull-requests-limit: 5

  # Composer (PHP) — minor + patch grouped, majors ungrouped.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      composer-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "php"]
    open-pull-requests-limit: 5

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 5
